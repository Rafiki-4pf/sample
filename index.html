<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PEAMS – Product Expiry Alert System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0A0D14;
    --surface: #111520;
    --surface2: #181E2E;
    --surface3: #1F2840;
    --border: #222B3E;
    --text: #E2E8F0;
    --muted: #556380;
    --accent: #4F8EF7;
    --expired: #FF2D55;
    --critical: #FF6B35;
    --warning: #FFD60A;
    --safe: #30D158;
  }
  body { font-family: 'DM Mono', monospace; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

  /* ── Loader ── */
  #loader {
    position: fixed; inset: 0; background: var(--bg); z-index: 999;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px;
  }
  .loader-icon { font-size: 56px; animation: spin 2s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader-title { font-size: 22px; font-weight: 700; letter-spacing: 4px; color: var(--text); }
  .loader-sub { font-size: 12px; color: var(--muted); letter-spacing: 2px; }
  .loader-bar { width: 240px; height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .loader-fill { height: 100%; background: var(--accent); animation: load 2s ease-in-out infinite; border-radius: 2px; }
  @keyframes load { 0%{width:0%} 60%{width:80%} 100%{width:100%} }

  /* ── Layout ── */
  #app { display: none; flex: 1; flex-direction: row; }
  #app.ready { display: flex; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

  aside {
    width: 240px; min-height: 100vh; background: var(--surface);
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
    padding: 24px 14px; gap: 6px; flex-shrink: 0;
  }
  .logo { display: flex; align-items: center; gap: 12px; padding: 10px; margin-bottom: 20px; }
  .logo-icon { font-size: 30px; }
  .logo-text { font-size: 15px; font-weight: 700; letter-spacing: 3px; }
  .logo-sub { font-size: 9px; color: var(--muted); letter-spacing: 2px; margin-top: 2px; }

  .nav-btn {
    display: flex; align-items: center; gap: 10px; padding: 10px 14px;
    border-radius: 8px; border: none; background: transparent; color: var(--muted);
    font-size: 13px; cursor: pointer; text-align: left; letter-spacing: 0.5px;
    font-family: 'DM Mono', monospace; transition: all 0.15s; width: 100%;
  }
  .nav-btn:hover { background: var(--surface2); color: var(--text); }
  .nav-btn.active { background: var(--surface2); color: var(--text); font-weight: 600; }
  .nav-icon { font-size: 16px; }

  .sidebar-section-title {
    font-size: 9px; color: var(--muted); letter-spacing: 2px;
    text-transform: uppercase; padding: 4px 10px; margin-top: 20px; margin-bottom: 6px;
  }
  .alert-row {
    display: flex; align-items: center; gap: 8px; padding: 8px 10px;
    border-radius: 6px; border: none; background: transparent; cursor: pointer;
    width: 100%; transition: background 0.1s; font-family: 'DM Mono', monospace;
  }
  .alert-row:hover { background: var(--surface2); }
  .alert-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .alert-label { flex: 1; font-size: 12px; color: var(--muted); text-align: left; }
  .alert-count { font-size: 14px; font-weight: 700; }

  .add-btn {
    margin-top: auto; padding: 12px; border-radius: 10px;
    border: 1px solid var(--accent); background: rgba(79,142,247,0.12);
    color: var(--accent); font-size: 13px; font-weight: 600; cursor: pointer;
    letter-spacing: 0.5px; transition: all 0.2s; font-family: 'DM Mono', monospace;
  }
  .add-btn:hover { background: rgba(79,142,247,0.25); transform: translateY(-1px); }

  .py-badge {
    margin-top: 12px; padding: 8px 12px; border-radius: 8px;
    background: rgba(255,214,10,0.08); border: 1px solid rgba(255,214,10,0.2);
    font-size: 10px; color: #FFD60A; letter-spacing: 1px; text-align: center;
  }

  /* ── Main ── */
  main { flex: 1; overflow: auto; }
  .page { padding: 36px 44px; max-width: 1180px; }

  .page-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 36px; }
  .page-title { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
  .page-subtitle { font-size: 12px; color: var(--muted); margin-top: 6px; letter-spacing: 0.5px; }

  /* ── Stats ── */
  .stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 40px; }
  .stat-card {
    background: var(--surface); border: 1px solid; border-radius: 12px;
    padding: 20px 16px; display: flex; flex-direction: column; gap: 8px;
    cursor: pointer; transition: transform 0.15s;
  }
  .stat-card:hover { transform: translateY(-2px); }
  .stat-icon { font-size: 20px; }
  .stat-value { font-size: 34px; font-weight: 700; line-height: 1; }
  .stat-label { font-size: 10px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; }
  .stat-bar { height: 4px; border-radius: 2px; margin-top: 4px; }
  .stat-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }

  /* ── Table ── */
  .section-title { font-size: 11px; font-weight: 600; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin: 0 0 14px 0; }
  .table-wrap { background: var(--surface); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  th { padding: 12px 16px; text-align: left; font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; background: var(--surface2); font-weight: 600; }
  tr.data-row { cursor: pointer; border-top: 1px solid var(--border); transition: background 0.1s; }
  tr.data-row:hover { background: rgba(255,255,255,0.025); }
  td { padding: 12px 16px; font-size: 13px; }

  .cat-badge { background: var(--surface2); padding: 3px 8px; border-radius: 4px; font-size: 11px; color: var(--muted); }
  .days-chip { padding: 3px 10px; border-radius: 100px; font-size: 12px; font-weight: 600; }
  .status-badge { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; border: 1px solid; white-space: nowrap; }

  /* ── Controls ── */
  .controls { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; align-items: center; }
  .search-input {
    padding: 10px 16px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); font-size: 13px;
    flex: 1; min-width: 180px; outline: none; font-family: 'DM Mono', monospace;
  }
  .search-input:focus { border-color: var(--accent); }
  .filter-group { display: flex; gap: 5px; flex-wrap: wrap; }
  .filter-btn {
    padding: 8px 14px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface); color: var(--muted); font-size: 11px;
    cursor: pointer; font-family: 'DM Mono', monospace; transition: all 0.15s; letter-spacing: 0.5px;
  }
  .filter-btn.active { color: #fff; border-color: transparent; }
  .sort-select {
    padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); font-size: 12px;
    cursor: pointer; font-family: 'DM Mono', monospace; outline: none;
  }
  .sort-select option { background: var(--surface2); }

  /* ── List layout ── */
  .list-layout { display: flex; gap: 18px; }
  .product-list { flex: 1; display: flex; flex-direction: column; gap: 10px; min-width: 0; }
  .product-card {
    border: 1px solid; border-radius: 10px; background: var(--surface);
    cursor: pointer; display: flex; overflow: hidden; transition: all 0.15s;
  }
  .product-card:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(0,0,0,0.35); }
  .product-card.selected { border-color: var(--accent) !important; background: rgba(79,142,247,0.06); }
  .card-accent { width: 4px; flex-shrink: 0; }
  .card-body { flex: 1; padding: 14px 16px; }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .card-name { font-weight: 600; font-size: 14px; margin-bottom: 3px; }
  .card-cat { font-size: 11px; color: var(--muted); }
  .card-bottom { display: flex; justify-content: space-between; align-items: center; }
  .card-date { font-size: 11px; color: var(--muted); }
  .empty { color: var(--muted); text-align: center; padding: 60px; font-size: 14px; }

  /* ── Detail Panel ── */
  .detail-panel {
    width: 300px; flex-shrink: 0; background: var(--surface); border-radius: 14px;
    border: 1px solid var(--border); padding: 24px; display: flex;
    flex-direction: column; gap: 20px; align-self: flex-start; position: sticky; top: 0;
  }
  .detail-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 16px; border-bottom: 2px solid; }
  .detail-status { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 10px; }
  .detail-status-icon { font-size: 22px; }
  .detail-status-text .st-label { font-size: 9px; opacity: 0.7; letter-spacing: 1.5px; text-transform: uppercase; }
  .detail-status-text .st-val { font-weight: 700; font-size: 15px; }
  .days-count { font-size: 38px; font-weight: 700; line-height: 1; text-align: right; }
  .days-count-unit { font-size: 11px; opacity: 0.6; display: block; }
  .detail-name { font-size: 17px; font-weight: 700; line-height: 1.3; }
  .detail-fields { display: flex; flex-direction: column; gap: 14px; }
  .field-label { font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
  .field-value { font-size: 13px; font-weight: 500; }
  .progress-section {}
  .progress-label { font-size: 10px; color: var(--muted); margin-bottom: 8px; }
  .progress-bg { height: 6px; border-radius: 3px; background: var(--surface2); }
  .progress-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
  .detail-actions { display: flex; gap: 10px; }
  .edit-btn {
    flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--accent);
    background: rgba(79,142,247,0.12); color: var(--accent); font-size: 13px;
    font-weight: 600; cursor: pointer; font-family: 'DM Mono', monospace;
  }
  .edit-btn:hover { background: rgba(79,142,247,0.22); }
  .del-btn {
    padding: 10px 14px; border-radius: 8px; border: 1px solid rgba(255,45,85,0.3);
    background: rgba(255,45,85,0.08); color: #FF2D55; font-size: 13px;
    cursor: pointer; font-family: 'DM Mono', monospace;
  }
  .del-btn:hover { background: rgba(255,45,85,0.18); }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    display: flex; align-items: center; justify-content: center; z-index: 100;
  }
  .modal {
    background: var(--surface); border-radius: 16px; border: 1px solid var(--border);
    padding: 32px; width: 560px; max-width: 95vw; max-height: 90vh; overflow: auto;
  }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .modal-title { font-size: 18px; font-weight: 700; }
  .close-btn { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-field { display: flex; flex-direction: column; gap: 6px; }
  .form-field.full { grid-column: 1/-1; }
  .form-label { font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
  .form-input {
    padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text); font-size: 13px;
    font-family: 'DM Mono', monospace; outline: none; transition: border-color 0.15s;
  }
  .form-input:focus { border-color: var(--accent); }
  textarea.form-input { height: 80px; resize: vertical; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px; }
  .cancel-btn {
    padding: 10px 20px; border-radius: 8px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); font-size: 13px;
    cursor: pointer; font-family: 'DM Mono', monospace;
  }
  .save-btn {
    padding: 10px 24px; border-radius: 8px; border: none;
    background: var(--accent); color: #fff; font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: 'DM Mono', monospace; transition: opacity 0.15s;
  }
  .save-btn:hover { opacity: 0.85; }

  /* ── Notification ── */
  #notif {
    position: fixed; top: 24px; right: 24px; padding: 12px 20px;
    border-radius: 10px; color: #fff; font-size: 13px; font-weight: 600;
    z-index: 200; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    transform: translateY(-80px); transition: transform 0.3s ease;
    font-family: 'DM Mono', monospace;
  }
  #notif.show { transform: translateY(0); }

  /* Python console badge */
  .py-engine-note {
    display: flex; align-items: center; gap: 8px; padding: 10px 14px;
    background: rgba(255,214,10,0.06); border: 1px solid rgba(255,214,10,0.15);
    border-radius: 8px; font-size: 11px; color: #FFD60A; margin-bottom: 20px; letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<!-- Loader -->
<div id="loader">
  <div class="loader-icon">🐍</div>
  <div class="loader-title">PEAMS</div>
  <div class="loader-sub">LOADING PYTHON DETECTION ENGINE…</div>
  <div class="loader-bar"><div class="loader-fill"></div></div>
</div>

<!-- Notification -->
<div id="notif"></div>

<!-- App Shell -->
<div id="app">
  <!-- Sidebar -->
  <aside>
    <div class="logo">
      <div class="logo-icon">⏱</div>
      <div>
        <div class="logo-text">PEAMS</div>
        <div class="logo-sub">Expiry Alert System</div>
      </div>
    </div>

    <button class="nav-btn active" data-view="dashboard" onclick="switchView('dashboard')">
      <span class="nav-icon">◈</span> Dashboard
    </button>
    <button class="nav-btn" data-view="list" onclick="switchView('list')">
      <span class="nav-icon">☰</span> Products
    </button>

    <div class="sidebar-section-title">QUICK STATUS</div>
    <button class="alert-row" onclick="setFilter('expired');switchView('list')">
      <span class="alert-dot" style="background:var(--expired)"></span>
      <span class="alert-label">Expired</span>
      <span class="alert-count" id="sb-expired" style="color:var(--expired)">0</span>
    </button>
    <button class="alert-row" onclick="setFilter('critical');switchView('list')">
      <span class="alert-dot" style="background:var(--critical)"></span>
      <span class="alert-label">Critical</span>
      <span class="alert-count" id="sb-critical" style="color:var(--critical)">0</span>
    </button>
    <button class="alert-row" onclick="setFilter('warning');switchView('list')">
      <span class="alert-dot" style="background:var(--warning)"></span>
      <span class="alert-label">Warning</span>
      <span class="alert-count" id="sb-warning" style="color:var(--warning)">0</span>
    </button>
    <button class="alert-row" onclick="setFilter('safe');switchView('list')">
      <span class="alert-dot" style="background:var(--safe)"></span>
      <span class="alert-label">Safe</span>
      <span class="alert-count" id="sb-safe" style="color:var(--safe)">0</span>
    </button>

    <div class="py-badge">🐍 Python Detection Engine<br>powered by Pyodide</div>
    <button class="add-btn" onclick="openForm()">+ Add Product</button>
  </aside>

  <!-- Main -->
  <main>
    <div id="view-dashboard" class="page"></div>
    <div id="view-list" class="page" style="display:none"></div>
  </main>
</div>

<!-- Modal -->
<div id="modal-overlay" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeForm()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="form-title">Add New Product</div>
      <button class="close-btn" onclick="closeForm()">✕</button>
    </div>
    <div class="form-grid">
      <div class="form-field">
        <label class="form-label">Product Name *</label>
        <input class="form-input" id="f-name" placeholder="e.g. Aspirin 500mg">
      </div>
      <div class="form-field">
        <label class="form-label">Category *</label>
        <select class="form-input" id="f-category">
          <option>Food & Beverage</option><option>Medicine</option>
          <option>Cosmetics</option><option>Electronics</option><option>Other</option>
        </select>
      </div>
      <div class="form-field">
        <label class="form-label">Quantity *</label>
        <input class="form-input" id="f-quantity" type="number" placeholder="0">
      </div>
      <div class="form-field">
        <label class="form-label">Unit</label>
        <input class="form-input" id="f-unit" placeholder="tablets / liters / pcs">
      </div>
      <div class="form-field">
        <label class="form-label">Expiry Date *</label>
        <input class="form-input" id="f-expiry" type="date">
      </div>
      <div class="form-field">
        <label class="form-label">Alert Threshold (days)</label>
        <select class="form-input" id="f-threshold">
          <option value="7">7 days</option><option value="14" selected>14 days</option>
          <option value="30">30 days</option><option value="60">60 days</option>
          <option value="90">90 days</option>
        </select>
      </div>
      <div class="form-field full">
        <label class="form-label">Notes</label>
        <textarea class="form-input" id="f-notes" placeholder="Optional notes…"></textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="cancel-btn" onclick="closeForm()">Cancel</button>
      <button class="save-btn" onclick="saveProduct()">Save Product</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
let pyodide = null;
let products = [];
let currentView = "dashboard";
let currentFilter = "all";
let currentSearch = "";
let currentSort = "expiry";
let selectedId = null;
let editingId = null;
let nextId = 100;

const SAMPLE = [
  { id:"1", name:"Aspirin 500mg",     category:"Medicine",       quantity:50, unit:"tablets", expiry_date:"2025-03-10", alert_threshold:30, notes:"Pain relief",        created: Date.now() },
  { id:"2", name:"Orange Juice",      category:"Food & Beverage",quantity:2,  unit:"liters",  expiry_date:"2026-03-05", alert_threshold:7,  notes:"",                   created: Date.now() },
  { id:"3", name:"Face Cream SPF50",  category:"Cosmetics",      quantity:1,  unit:"jar",     expiry_date:"2026-05-20", alert_threshold:30, notes:"Daily moisturizer",   created: Date.now() },
  { id:"4", name:"Amoxicillin 250mg", category:"Medicine",       quantity:20, unit:"capsules",expiry_date:"2025-02-15", alert_threshold:14, notes:"Antibiotic course",   created: Date.now() },
  { id:"5", name:"Whole Milk",        category:"Food & Beverage",quantity:1,  unit:"gallon",  expiry_date:"2026-03-03", alert_threshold:7,  notes:"",                   created: Date.now() },
  { id:"6", name:"Sunscreen SPF100",  category:"Cosmetics",      quantity:2,  unit:"bottles", expiry_date:"2025-03-25", alert_threshold:30, notes:"Sport formula",       created: Date.now() },
  { id:"7", name:"Vitamin D3",        category:"Medicine",       quantity:90, unit:"softgels",expiry_date:"2026-09-01", alert_threshold:30, notes:"",                   created: Date.now() },
];

// ═══════════════════════════════════════════════════════════
//  PYTHON DETECTION ENGINE (runs in Pyodide)
// ═══════════════════════════════════════════════════════════
const PYTHON_ENGINE = `
import json
from datetime import date, datetime

# ── Core detection functions ──────────────────────────────

def days_until_expiry(expiry_date_str: str) -> int:
    """Calculate days remaining until product expiry. Negative = already expired."""
    today = date.today()
    expiry = datetime.strptime(expiry_date_str, "%Y-%m-%d").date()
    return (expiry - today).days

def classify_status(days: int) -> str:
    """
    Python expiry status classifier.
    Returns: 'expired' | 'critical' | 'warning' | 'safe'
    """
    if days < 0:
        return "expired"
    elif days <= 7:
        return "critical"
    elif days <= 30:
        return "warning"
    else:
        return "safe"

def compute_alert_level(days: int, threshold: int) -> str:
    """
    Compute alert level relative to the product's custom threshold.
    Percentage of threshold remaining.
    """
    if days < 0:
        return "overdue"
    pct = (days / threshold) * 100 if threshold > 0 else 0
    if pct <= 0:
        return "zero"
    elif pct <= 25:
        return "urgent"
    elif pct <= 75:
        return "moderate"
    else:
        return "comfortable"

def enrich_product(product: dict) -> dict:
    """Enrich a single product dict with computed expiry fields."""
    days = days_until_expiry(product["expiry_date"])
    status = classify_status(days)
    alert = compute_alert_level(days, product.get("alert_threshold", 30))
    pct_remaining = max(0.0, min(100.0, (days / product["alert_threshold"]) * 100)) if product.get("alert_threshold") else 0.0

    return {
        **product,
        "days_remaining": days,
        "status": status,
        "alert_level": alert,
        "pct_remaining": round(pct_remaining, 1),
        "days_label": f"{abs(days)}d overdue" if days < 0 else ("Expires today!" if days == 0 else f"{days}d left"),
    }

def compute_stats(products: list) -> dict:
    """Aggregate expiry statistics across all products."""
    enriched = [enrich_product(p) for p in products]
    counts = {"total": len(enriched), "expired": 0, "critical": 0, "warning": 0, "safe": 0}
    for p in enriched:
        counts[p["status"]] += 1
    return counts

def filter_and_sort(products: list, status_filter: str, search: str, sort_by: str) -> list:
    """
    Python-powered filtering and sorting pipeline.
    - status_filter: 'all' | 'expired' | 'critical' | 'warning' | 'safe'
    - search: substring match on name/category
    - sort_by: 'expiry' | 'name' | 'category' | 'days'
    """
    enriched = [enrich_product(p) for p in products]

    # Filter by status
    if status_filter != "all":
        enriched = [p for p in enriched if p["status"] == status_filter]

    # Search filter
    q = search.lower().strip()
    if q:
        enriched = [
            p for p in enriched
            if q in p["name"].lower() or q in p["category"].lower() or q in p.get("notes","").lower()
        ]

    # Sort
    if sort_by == "expiry":
        enriched.sort(key=lambda p: p["days_remaining"])
    elif sort_by == "name":
        enriched.sort(key=lambda p: p["name"].lower())
    elif sort_by == "category":
        enriched.sort(key=lambda p: p["category"].lower())
    elif sort_by == "days":
        enriched.sort(key=lambda p: p["days_remaining"])

    return enriched

def get_alerts(products: list) -> list:
    """Return products that need attention (expired + critical + warning)."""
    enriched = [enrich_product(p) for p in products]
    alerts = [p for p in enriched if p["status"] in ("expired", "critical", "warning")]
    alerts.sort(key=lambda p: p["days_remaining"])
    return alerts

# ── JS-callable API ──────────────────────────────────────

def js_enrich(products_json: str) -> str:
    products = json.loads(products_json)
    return json.dumps([enrich_product(p) for p in products])

def js_stats(products_json: str) -> str:
    products = json.loads(products_json)
    return json.dumps(compute_stats(products))

def js_filter(products_json: str, status_filter: str, search: str, sort_by: str) -> str:
    products = json.loads(products_json)
    return json.dumps(filter_and_sort(products, status_filter, search, sort_by))

def js_alerts(products_json: str) -> str:
    products = json.loads(products_json)
    return json.dumps(get_alerts(products))

print("🐍 Python Detection Engine ready.")
`;

// ═══════════════════════════════════════════════════════════
//  PYODIDE INIT
// ═══════════════════════════════════════════════════════════
async function initPython() {
  pyodide = await loadPyodide();
  await pyodide.runPythonAsync(PYTHON_ENGINE);

  // Load saved products or use sample
  try {
    const saved = localStorage.getItem("peams-v2-products");
    products = saved ? JSON.parse(saved) : SAMPLE;
  } catch { products = SAMPLE; }

  document.getElementById("loader").style.display = "none";
  document.getElementById("app").classList.add("ready");
  render();
}

// ═══════════════════════════════════════════════════════════
//  PYTHON CALLS
// ═══════════════════════════════════════════════════════════
function pyStats() {
  const r = pyodide.runPython(`js_stats('${JSON.stringify(products).replace(/'/g,"\\'")}')`)
  return JSON.parse(r);
}

function pyFilter() {
  const j = JSON.stringify(products).replace(/'/g,"\\'");
  const f = currentFilter;
  const s = currentSearch.replace(/'/g,"\\'");
  const o = currentSort;
  const r = pyodide.runPython(`js_filter('${j}', '${f}', '${s}', '${o}')`)
  return JSON.parse(r);
}

function pyEnrich(product) {
  const j = JSON.stringify([product]).replace(/'/g,"\\'");
  const r = pyodide.runPython(`js_enrich('${j}')`)
  return JSON.parse(r)[0];
}

// ═══════════════════════════════════════════════════════════
//  STATUS CONFIG
// ═══════════════════════════════════════════════════════════
const STATUS = {
  expired: { label:"Expired",  color:"#FF2D55", bg:"rgba(255,45,85,0.08)",   icon:"☠" },
  critical:{ label:"Critical", color:"#FF6B35", bg:"rgba(255,107,53,0.08)",  icon:"⚠" },
  warning: { label:"Warning",  color:"#FFD60A", bg:"rgba(255,214,10,0.08)",  icon:"⏳" },
  safe:    { label:"Safe",     color:"#30D158", bg:"rgba(48,209,88,0.08)",   icon:"✓" },
};

// ═══════════════════════════════════════════════════════════
//  PERSISTENCE
// ═══════════════════════════════════════════════════════════
function save() { try { localStorage.setItem("peams-v2-products", JSON.stringify(products)); } catch{} }

// ═══════════════════════════════════════════════════════════
//  NOTIFICATIONS
// ═══════════════════════════════════════════════════════════
let notifTimer;
function notify(msg, type="success") {
  const el = document.getElementById("notif");
  el.textContent = msg;
  el.style.background = type === "error" ? "#FF2D55" : "#30D158";
  el.classList.add("show");
  clearTimeout(notifTimer);
  notifTimer = setTimeout(() => el.classList.remove("show"), 3000);
}

// ═══════════════════════════════════════════════════════════
//  VIEW SWITCHING
// ═══════════════════════════════════════════════════════════
function switchView(v) {
  currentView = v;
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.toggle("active", b.dataset.view === v));
  document.getElementById("view-dashboard").style.display = v === "dashboard" ? "" : "none";
  document.getElementById("view-list").style.display = v === "list" ? "" : "none";
  render();
}

function setFilter(f) { currentFilter = f; }

// ═══════════════════════════════════════════════════════════
//  MAIN RENDER
// ═══════════════════════════════════════════════════════════
function render() {
  const stats = pyStats();
  // Update sidebar counts
  ["expired","critical","warning","safe"].forEach(k => {
    document.getElementById("sb-"+k).textContent = stats[k];
  });

  if (currentView === "dashboard") renderDashboard(stats);
  if (currentView === "list") renderList();
}

// ── Dashboard ───────────────────────────────────────────────
function renderDashboard(stats) {
  const upcoming = pyFilter(); // uses current filter/sort
  // override for dashboard: show all sorted by expiry
  const j = JSON.stringify(products).replace(/'/g,"\\'");
  const allSorted = JSON.parse(pyodide.runPython(`js_filter('${j}', 'all', '', 'expiry')`));

  const dateStr = new Date().toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"});

  const statCards = [
    { label:"Total Products", value:stats.total,   color:"#A0A9C0", icon:"📦" },
    { label:"Expired",        value:stats.expired,  color:"#FF2D55", icon:"☠"  },
    { label:"Critical ≤7d",   value:stats.critical, color:"#FF6B35", icon:"⚠"  },
    { label:"Warning ≤30d",   value:stats.warning,  color:"#FFD60A", icon:"⏳" },
    { label:"Safe",           value:stats.safe,     color:"#30D158", icon:"✓"  },
  ];

  const rows = allSorted.slice(0,10).map(p => {
    const s = STATUS[p.status];
    return `
      <tr class="data-row" onclick="selectProduct('${p.id}');switchView('list')">
        <td><strong>${p.name}</strong></td>
        <td><span class="cat-badge">${p.category}</span></td>
        <td>${p.quantity} ${p.unit}</td>
        <td>${new Date(p.expiry_date).toLocaleDateString()}</td>
        <td><span class="days-chip" style="color:${s.color};background:${s.bg}">${p.days_label}</span></td>
        <td><span class="status-badge" style="color:${s.color};background:${s.bg};border-color:${s.color}40">${s.icon} ${s.label}</span></td>
      </tr>`;
  }).join("");

  document.getElementById("view-dashboard").innerHTML = `
    <div class="py-engine-note">🐍 All detections powered by Python · <em>datetime</em> · <em>classify_status()</em> · <em>compute_stats()</em></div>
    <div class="page-header">
      <div>
        <div class="page-title">Dashboard</div>
        <div class="page-subtitle">${dateStr}</div>
      </div>
    </div>
    <div class="stats-grid">
      ${statCards.map(c=>`
        <div class="stat-card" style="border-color:${c.color}30" onclick="setFilter('${c.label.toLowerCase().split(' ')[0]}');switchView('list')">
          <div class="stat-icon">${c.icon}</div>
          <div class="stat-value" style="color:${c.color}">${c.value}</div>
          <div class="stat-label">${c.label}</div>
          <div class="stat-bar" style="background:${c.color}15">
            <div class="stat-fill" style="background:${c.color};width:${Math.min(100,c.value*15)}%"></div>
          </div>
        </div>`).join("")}
    </div>
    <div class="section-title">Upcoming Expirations — sorted by Python engine</div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Product</th><th>Category</th><th>Quantity</th>
          <th>Expiry Date</th><th>Days Left</th><th>Status</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

// ── List ────────────────────────────────────────────────────
function renderList() {
  const filtered = pyFilter();
  const selected = selectedId ? products.find(p=>p.id===selectedId) : null;
  const enrichedSelected = selected ? pyEnrich(selected) : null;

  const cards = filtered.length === 0
    ? `<div class="empty">No products match the current filter.</div>`
    : filtered.map(p => {
        const s = STATUS[p.status];
        const isSel = p.id === selectedId;
        return `
          <div class="product-card ${isSel?"selected":""}" style="border-color:${isSel?"var(--accent)":s.color+"30"}"
               onclick="selectProduct('${p.id}')">
            <div class="card-accent" style="background:${s.color}"></div>
            <div class="card-body">
              <div class="card-top">
                <div>
                  <div class="card-name">${p.name}</div>
                  <div class="card-cat">${p.category} · ${p.quantity} ${p.unit}</div>
                </div>
                <span class="status-badge" style="color:${s.color};background:${s.bg};border-color:${s.color}40;font-size:11px">${s.icon} ${s.label}</span>
              </div>
              <div class="card-bottom">
                <span class="card-date">📅 ${new Date(p.expiry_date).toLocaleDateString()}</span>
                <span class="days-chip" style="color:${s.color};background:${s.bg};font-size:11px">${p.days_label}</span>
              </div>
            </div>
          </div>`;
      }).join("");

  const detailHTML = enrichedSelected ? renderDetailPanel(enrichedSelected) : "";

  document.getElementById("view-list").innerHTML = `
    <div class="py-engine-note">🐍 Filtering & sorting via Python · <em>filter_and_sort()</em> · <em>classify_status()</em> · <em>days_until_expiry()</em></div>
    <div class="page-header">
      <div>
        <div class="page-title">Products</div>
        <div class="page-subtitle">${filtered.length} item${filtered.length!==1?"s":""} — Python engine active</div>
      </div>
    </div>
    <div class="controls">
      <input class="search-input" placeholder="🔍  Search products…"
        value="${currentSearch}" oninput="currentSearch=this.value;render()">
      <div class="filter-group">
        ${["all","expired","critical","warning","safe"].map(f=>`
          <button class="filter-btn ${currentFilter===f?"active":""}"
            style="${currentFilter===f&&f!=="all"?`background:${STATUS[f]?.color};border-color:transparent`:""}
                   ${currentFilter===f&&f==="all"?"background:#4F8EF7;border-color:transparent":""}"
            onclick="currentFilter='${f}';render()">${f==="all"?"All":(STATUS[f]?.label||f)}</button>
        `).join("")}
      </div>
      <select class="sort-select" onchange="currentSort=this.value;render()">
        <option value="expiry" ${currentSort==="expiry"?"selected":""}>Sort: Expiry Date</option>
        <option value="name"   ${currentSort==="name"  ?"selected":""}>Sort: Name</option>
        <option value="category"${currentSort==="category"?"selected":""}>Sort: Category</option>
      </select>
    </div>
    <div class="list-layout">
      <div class="product-list">${cards}</div>
      ${enrichedSelected ? `<div class="detail-panel">${detailHTML}</div>` : ""}
    </div>
  `;
}

function renderDetailPanel(p) {
  const s = STATUS[p.status];
  const absDays = Math.abs(p.days_remaining);
  const expiredLabel = p.days_remaining < 0 ? "days overdue" : "days left";
  return `
    <div class="detail-header" style="border-color:${s.color}">
      <div class="detail-status" style="color:${s.color};background:${s.bg}">
        <div class="detail-status-icon">${s.icon}</div>
        <div class="detail-status-text">
          <div class="st-label">STATUS</div>
          <div class="st-val">${s.label}</div>
        </div>
      </div>
      <div class="days-count" style="color:${s.color}">
        ${absDays}<span class="days-count-unit">${expiredLabel}</span>
      </div>
    </div>
    <div class="detail-name">${p.name}</div>
    <div class="detail-fields">
      ${[
        ["Category", p.category],
        ["Quantity", `${p.quantity} ${p.unit}`],
        ["Expiry Date", new Date(p.expiry_date).toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"})],
        ["Alert Threshold", `${p.alert_threshold} days`],
        ["Alert Level", `${p.alert_level} (${p.pct_remaining}% remaining)`],
        ["Python Status", `classify_status(${p.days_remaining}) → ${p.status}`],
        ...(p.notes ? [["Notes", p.notes]] : []),
      ].map(([l,v])=>`
        <div>
          <div class="field-label">${l}</div>
          <div class="field-value">${v}</div>
        </div>`).join("")}
    </div>
    <div class="progress-section">
      <div class="progress-label">Threshold progress (${p.alert_threshold}d window)</div>
      <div class="progress-bg">
        <div class="progress-fill" style="width:${p.pct_remaining}%;background:${s.color}"></div>
      </div>
    </div>
    <div class="detail-actions">
      <button class="edit-btn" onclick="openForm('${p.id}')">Edit</button>
      <button class="del-btn" onclick="deleteProduct('${p.id}')">Delete</button>
    </div>
  `;
}

// ═══════════════════════════════════════════════════════════
//  PRODUCT ACTIONS
// ═══════════════════════════════════════════════════════════
function selectProduct(id) {
  selectedId = selectedId === id ? null : id;
  render();
}

function deleteProduct(id) {
  products = products.filter(p => p.id !== id);
  if (selectedId === id) selectedId = null;
  save();
  notify("Product deleted", "error");
  render();
}

// ── Form ────────────────────────────────────────────────────
function openForm(id=null) {
  editingId = id;
  const p = id ? products.find(x=>x.id===id) : null;
  document.getElementById("form-title").textContent = p ? "Edit Product" : "Add New Product";
  document.getElementById("f-name").value     = p?.name        || "";
  document.getElementById("f-category").value = p?.category    || "Food & Beverage";
  document.getElementById("f-quantity").value = p?.quantity    || "";
  document.getElementById("f-unit").value     = p?.unit        || "units";
  document.getElementById("f-expiry").value   = p?.expiry_date || "";
  document.getElementById("f-threshold").value= p?.alert_threshold || 14;
  document.getElementById("f-notes").value    = p?.notes       || "";
  document.getElementById("modal-overlay").style.display = "flex";
}

function closeForm() {
  document.getElementById("modal-overlay").style.display = "none";
  editingId = null;
}

function saveProduct() {
  const name     = document.getElementById("f-name").value.trim();
  const qty      = document.getElementById("f-quantity").value;
  const expiry   = document.getElementById("f-expiry").value;
  if (!name || !qty || !expiry) { alert("Please fill in required fields (Name, Quantity, Expiry Date)."); return; }

  const data = {
    id: editingId || String(++nextId),
    name,
    category:        document.getElementById("f-category").value,
    quantity:        Number(qty),
    unit:            document.getElementById("f-unit").value || "units",
    expiry_date:     expiry,
    alert_threshold: Number(document.getElementById("f-threshold").value),
    notes:           document.getElementById("f-notes").value.trim(),
    created:         editingId ? products.find(p=>p.id===editingId)?.created : Date.now(),
  };

  if (editingId) {
    products = products.map(p => p.id === editingId ? data : p);
    notify("Product updated ✓");
  } else {
    products.push(data);
    notify("Product added ✓");
  }
  save();
  closeForm();
  render();
}

// ═══════════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════════
initPython().catch(e => {
  console.error(e);
  document.getElementById("loader").innerHTML = `
    <div style="color:#FF2D55;font-size:14px;font-family:monospace;text-align:center;padding:40px">
      ⚠ Failed to load Python engine.<br><small>${e.message}</small>
    </div>`;
});
</script>
